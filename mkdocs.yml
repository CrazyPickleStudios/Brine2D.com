docs_dir: docs
site_url: https://www.Brine2D.com/
site_dir: site

site_name: Brine2D
site_description: A modern, high-performance 2D game engine for C# and .NET.
site_author: CrazyPickle Studios

repo_url: https://github.com/CrazyPickleStudios/Brine2D.com
repo_name: ""

theme:
  name: material
  language: en
  custom_dir: theme
  font:
    text: Public Sans
    code: DM Mono
  palette:
    - media: "(prefers-color-scheme)"
      scheme: default
      accent: deep purple
      toggle:
        icon: material/brightness-auto
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      accent: green
      toggle:
        icon: material/brightness-2
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      accent: deep purple
      toggle:
        icon: material/brightness-5
        name: Switch to system theme
  # favicon: assets/brand/logos/png/favicon-32x32.png
  icon:
    repo: simple/github
  features:
    - announce.dismiss
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - search.highlight

extra_css:
  - assets/stylesheets/extra.css
extra_javascript:
  - assets/javascripts/code-copy-title.js
watch:
  - theme

plugins:
  tags: {}
  search: {}
  privacy:
    enabled: true
  offline:
    enabled: false
  group:
    enabled: false
    plugins:
      macros: {}
      meta: {}
      git-authors:
        enabled: false
        sort_authors_by: contribution
        show_contribution: true
        fallback_to_empty: true
        authorship_threshold_percent: 1
      git-revision-date-localized:
        enabled: false
        exclude:
          - index.md
        fallback_to_build_date: true
        enable_creation_date: true
      typeset: {}
      social:
        cards: true
        cards_dir: assets/img/social
        cards_layout_dir: theme/layouts
        cards_layout: page
        # cards_layout: pride

markdown_extensions:
  admonition: {}
  pymdownx.details: {}
  pymdownx.highlight:
    use_pygments: true
    anchor_linenums: true
    auto_title: true
  pymdownx.pygments:
    light: github-light
    dark: github-dark
  pymdownx.superfences:
    custom_fences:
      - name: mermaid
        class: mermaid
        format: !!python/name:pymdownx.superfences.fence_code_format 
  pymdownx.inlinehilite: {}  
  pymdownx.tabbed:
    alternate_style: true
  pymdownx.arithmatex:
    generic: true
  pymdownx.critic: {}
  pymdownx.caret: {}
  pymdownx.keys: {}
  pymdownx.mark: {}
  pymdownx.tilde: {}
  pymdownx.snippets:
    auto_append:
      - includes/abbreviations.en.txt
  pymdownx.tasklist:
    custom_checkbox: true
  attr_list: {}
  def_list: {}
  md_in_html: {}
  meta: {}
  abbr: {}
  pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji 
    emoji_generator: !!python/name:material.extensions.emoji.to_svg 
    options:
      custom_icons:
        - theme/icons
  tables: {}
  footnotes: {}
  toc:
    toc_depth: 4
   
