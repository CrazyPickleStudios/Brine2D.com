name: ci 
on:
  push:
    branches:
      - master 
      - main
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout Brine2D engine
        uses: actions/checkout@v4
        with:
          repository: CrazyPickleStudios/Brine2D
          path: Brine2D
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build engine (generates XML doc file)
        run: dotnet build Brine2D/src/Brine2D/Brine2D.csproj --configuration Release
      - name: Install DefaultDocumentation
        run: dotnet tool install --global DefaultDocumentation.Console
      - name: Generate API reference
        run: |
          defaultdocumentation \
            --AssemblyFilePath Brine2D/src/Brine2D/bin/Release/net10.0/Brine2D.dll \
            --OutputDirectoryPath docs/api \
            --FileNameFactory DirectoryName
      - name: Generate API index page
        run: python scripts/generate_api_index.py && sed -n '170,185p' mkdocs.yml
      - name: Post-process API pages
        run: python scripts/postprocess_api.py
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV 
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: ~/.cache 
          restore-keys: |
            mkdocs-material-
      - run: pip install mkdocs-material
      - run: mkdocs gh-deploy --force
